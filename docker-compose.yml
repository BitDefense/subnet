version: '3.8'

x-python-base: &python-base
  env_file: .env
  volumes:
    - bittensor_wallets:/root/.bittensor/wallets
  networks:
    - bitdefense-net

x-miner-template: &miner-template
  <<: *python-base
  build:
    context: .
    dockerfile: Dockerfile.miner
  image: bitdefense-miner:v0.1.0

x-engine-template: &engine-template
  build:
    context: .
    dockerfile: Dockerfile.w3_engine
  image: bitdefense-w3-engine:v0.1.0
  env_file: .env
  networks:
    - bitdefense-net

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bitdefense-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  platform:
    build:
      context: .
      dockerfile: Dockerfile.platform
    image: bitdefense-platform:v0.1.0
    <<: *python-base
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      --host ${PLATFORM_HOST:-0.0.0.0}
      --port ${PLATFORM_PORT:-8000}
      --rpc_url ${PLATFORM_ETH_RPC_URL}
      --wallet.name ${PLATFORM_WALLET_NAME:-default}
      --wallet.hotkey ${PLATFORM_WALLET_HOTKEY:-default}
      --netuid ${NETUID:-2}
      --subtensor.network ${SUBTENSOR_NETWORK:-local}
      --logging.info

  validator_1:
    build:
      context: .
      dockerfile: Dockerfile.validator
    image: bitdefense-validator:v0.1.0
    <<: *python-base
    command: >
      --wallet.name ${VALIDATOR_WALLET_NAME:-validator}
      --wallet.hotkey default
      --netuid ${NETUID:-2}
      --axon.port 8901
      --logging.info
      --subtensor.network ${SUBTENSOR_NETWORK:-local}
      --eth_rpc_url ${VALIDATOR_1_ETH_RPC_URL}
      --eth_private_key ${VALIDATOR_1_ETH_PRIVATE_KEY}
      --platform.url ${PLATFORM_URL:-http://platform:8000}

  validator_2:
    build:
      context: .
      dockerfile: Dockerfile.validator
    image: bitdefense-validator:v0.1.0
    <<: *python-base
    command: >
      --wallet.name ${VALIDATOR_WALLET_NAME:-validator}
      --wallet.hotkey hotkey_2
      --netuid ${NETUID:-2}
      --axon.port 8902
      --logging.info
      --subtensor.network ${SUBTENSOR_NETWORK:-local}
      --eth_rpc_url ${VALIDATOR_2_ETH_RPC_URL}
      --eth_private_key ${VALIDATOR_2_ETH_PRIVATE_KEY}
      --platform.url ${PLATFORM_URL:-http://platform:8000}

  validator_3:
    build:
      context: .
      dockerfile: Dockerfile.validator
    image: bitdefense-validator:v0.1.0
    <<: *python-base
    command: >
      --wallet.name ${VALIDATOR_WALLET_NAME:-validator}
      --wallet.hotkey hotkey_3
      --netuid ${NETUID:-2}
      --axon.port 8903
      --logging.info
      --subtensor.network ${SUBTENSOR_NETWORK:-local}
      --eth_rpc_url ${VALIDATOR_3_ETH_RPC_URL}
      --eth_private_key ${VALIDATOR_3_ETH_PRIVATE_KEY}
      --platform.url ${PLATFORM_URL:-http://platform:8000}

  w3_engine_1:
    <<: *engine-template
    environment:
      - RPC=${MINER_1_ETH_RPC_URL}
  miner_1:
    <<: *miner-template
    command: >
      --wallet.name miner_1
      --wallet.hotkey default
      --netuid ${NETUID:-2}
      --axon.port 9001
      --logging.info
      --subtensor.network ${SUBTENSOR_NETWORK:-local}
      --engine.type remote
      --engine.remote_url http://w3_engine_1:9000

  w3_engine_2:
