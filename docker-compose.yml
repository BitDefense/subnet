version: '3.8'

x-python-base: &python-base
  env_file: .env
  volumes:
    - bittensor_wallets:/root/.bittensor/wallets
  networks:
    - bitdefense-net

x-miner-template: &miner-template
  <<: *python-base
  build:
    context: .
    dockerfile: Dockerfile.miner

x-engine-template: &engine-template
  build:
    context: .
    dockerfile: Dockerfile.w3_engine
  networks:
    - bitdefense-net

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bitdefense-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  platform:
    build:
      context: .
      dockerfile: Dockerfile.platform
    <<: *python-base
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      --host ${PLATFORM_HOST:-0.0.0.0}
      --port ${PLATFORM_PORT:-8000}
      --rpc_url ${ETH_RPC_URL}
      --wallet.name ${PLATFORM_WALLET_NAME:-default}
      --wallet.hotkey ${PLATFORM_WALLET_HOTKEY:-default}
      --netuid ${NETUID:-2}
      --subtensor.network ${SUBTENSOR_NETWORK:-local}
      --logging.info

  validator_1:
    build:
      context: .
      dockerfile: Dockerfile.validator
    <<: *python-base
    command: >
      --wallet.name ${VALIDATOR_WALLET_NAME:-validator}
      --wallet.hotkey default
      --netuid ${NETUID:-2}
      --axon.port 8901
      --logging.info
      --subtensor.network ${SUBTENSOR_NETWORK:-local}
      --eth_rpc_url ${ETH_RPC_URL}
      --eth_private_key ${ETH_PRIVATE_KEY}

  validator_2:
    build:
      context: .
      dockerfile: Dockerfile.validator
    <<: *python-base
    command: >
      --wallet.name ${VALIDATOR_WALLET_NAME:-validator}
      --wallet.hotkey hotkey_2
      --netuid ${NETUID:-2}
      --axon.port 8902
      --logging.info
      --subtensor.network ${SUBTENSOR_NETWORK:-local}
      --eth_rpc_url ${ETH_RPC_URL}
      --eth_private_key ${ETH_PRIVATE_KEY}

  validator_3:
    build:
      context: .
      dockerfile: Dockerfile.validator
    <<: *python-base
    command: >
      --wallet.name ${VALIDATOR_WALLET_NAME:-validator}
      --wallet.hotkey hotkey_3
      --netuid ${NETUID:-2}
      --axon.port 8903
      --logging.info
      --subtensor.network ${SUBTENSOR_NETWORK:-local}
      --eth_rpc_url ${ETH_RPC_URL}
      --eth_private_key ${ETH_PRIVATE_KEY}

networks:
  bitdefense-net:
    driver: bridge

volumes:
  postgres_data:
  bittensor_wallets:
